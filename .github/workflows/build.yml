name: Build Totem Firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your config repo
      - name: Checkout Totem config
        uses: actions/checkout@v3

      # 2️⃣ Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip ninja-build cmake gcc-arm-none-eabi git

      - name: Install west
        run: |
          pip3 install --user west
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # 3️⃣ Clone official ZMK workspace
      - name: Clone ZMK workspace
        run: |
          git clone --depth 1 https://github.com/zmkfirmware/zmk.git zmk-workspace
          cd zmk-workspace
          west init -l .
          west update

      # 4️⃣ Copy your Totem config into ZMK workspace
      - name: Copy Totem config
        run: |
          cp -r ../config zmk-workspace/config

      # 5️⃣ Build all Totem shields
      - name: Build Totem Shields
        run: |
          cd zmk-workspace
          SHIELDS=("totem_left" "totem_right" "settings_reset")
          for SHIELD in "${SHIELDS[@]}"; do
            BUILD_DIR="build/$SHIELD"
            echo "Building shield: $SHIELD -> $BUILD_DIR"
            west build -s app -d "$BUILD_DIR" \
              -b xiao_ble/nrf52840/zmk \
              -- -DZMK_CONFIG=./config -DSHIELD="$SHIELD"
          done

      # 6️⃣ Upload UF2 artifacts
      - name: Upload UF2 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: totem-uf2
          path: |
            zmk-workspace/build/totem_left/zephyr/zmk.uf2
            zmk-workspace/build/totem_right/zephyr/zmk.uf2
            zmk-workspace/build/settings_reset/zephyr/zmk.uf2
