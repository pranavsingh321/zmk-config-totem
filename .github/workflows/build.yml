name: Build Totem Firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip ninja-build cmake gcc-arm-none-eabi

      - name: Install west
        run: |
          pip3 install --user west
          export PATH="$HOME/.local/bin:$PATH"

      - name: Initialize ZMK workspace
        run: |
          west init -l zmk
          west update

      - name: Build Totem Shields
        run: |
          SHIELDS=("totem_left" "totem_right" "settings_reset")
          for SHIELD in "${SHIELDS[@]}"; do
            BUILD_DIR="build/$SHIELD"
            echo "Building shield: $SHIELD -> $BUILD_DIR"
            west build -s zmk/app -d "$BUILD_DIR" \
              -b xiao_ble/nrf52840/zmk \
              -- -DZMK_CONFIG=./config -DSHIELD="$SHIELD"
          done

      - name: Upload UF2 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: totem-uf2
          path: |
            build/totem_left/zephyr/zmk.uf2
            build/totem_right/zephyr/zmk.uf2
            build/settings_reset/zephyr/zmk.uf2
